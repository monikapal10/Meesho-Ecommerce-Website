<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meesho Clone</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="logo">
<img src="img/logo.png" alt="logo">
</div>

<div class="search">

<input type="text" placeholder="Search products">

<i class="fa fa-search"></i>

</div>

<div class="menu">

<span>Download App</span>
<span>Login</span>
<span><i class="fa fa-shopping-cart"></i> Cart</span>

</div>

</header>


<!-- CATEGORY NAVBAR -->

<nav class="category">

<ul>

<li>Women Ethnic</li>
<li>Women Western</li>
<li>Men</li>
<li>Kids</li>
<li>Home & Kitchen</li>
<li>Beauty</li>

</ul>

</nav>


<!-- BANNER -->

<section class="banner">

<img src="img/banner.jpg" alt="banner">

</section>


<!-- PRODUCTS -->

<section class="products">

<div class="card">

<img src="img/kurti.jpg" alt="Kurti">
<h4>Stylish Kurti</h4>

<p>₹399</p>

</div>


<div class="card">

<img src="img/saree.jpg" alt="Saree">

<h4>Designer Saree</h4>

<p>₹599</p>

</div>


<div class="card">

<img src="img/bag.png" alt="Bag">

<h4>Hand Bag</h4>

<p>₹299</p>

</div>

</section>


<script src="script.js"></script>

</body>
</html>
